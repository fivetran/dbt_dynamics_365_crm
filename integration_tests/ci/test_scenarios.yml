schema_variable_name: "dynamics_365_crm_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "appointment no maps data"
    vars:
      dynamics_365_crm_appointment_identifier: "appointment_no_maps_data"
      dynamics_365_crm_using_contact: false
      dynamics_365_crm_using_phonecall: false
      dynamics_365_crm_using_task: false
    include_incremental: false